<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Bull Binder — Now &amp; Forever</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1A0D0B;--sidebar:#120706;--surface:#271613;--surface-2:#31201C;
  --ink:#F1EAD8;--ink-soft:#C7AB9C;--line:#46271F;
  --red:#E5392B;--red-deep:#C01818;
  --gold:#F4B216;--cream:#F0F0D8;
  --note-bg:rgba(244,178,22,.11);--note-tx:#F4C842;
  --warn-bg:rgba(229,57,43,.14);--warn-tx:#FF9080;
  --display:"Fraunces",Georgia,serif;--ui:"Hanken Grotesk",-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--ui);background:var(--bg);color:var(--ink);display:flex;min-height:100dvh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* SIDEBAR */
.sidebar{width:276px;flex:0 0 276px;background:var(--sidebar);display:flex;flex-direction:column;padding:20px 18px;border-right:1px solid var(--line);overflow-y:auto;overflow-x:hidden}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:7px;padding:4px 0 16px;border-bottom:1px solid var(--line);margin-bottom:16px}
.logo-wrap img{filter:drop-shadow(0 6px 18px rgba(0,0,0,.6))}
.brand-name{font-family:var(--display);font-size:16px;font-weight:600;color:var(--cream);text-align:center}
.brand-tag{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;text-align:center}
.search-box{margin-bottom:16px}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 12px;font-family:var(--ui);font-size:13px;outline:none;transition:border-color .2s}
.search-box input::placeholder{color:var(--ink-soft);opacity:.55}
.search-box input:focus{border-color:rgba(244,178,22,.4)}
.nav-lbl{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(241,234,216,.3);font-weight:700;margin:0 4px 8px}
.nav{display:flex;flex-direction:column;gap:2px;margin-bottom:16px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s}
.ni:hover{background:rgba(241,234,216,.05)}
.ni.active{background:rgba(244,178,22,.1)}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ni-lbl{font-size:13px;font-weight:500;color:var(--ink-soft)}
.ni.active .ni-lbl{color:var(--gold)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* HOME / SECTION VIEW */
.home{flex:1;overflow-y:auto;padding:28px 32px}
.home h1{font-family:var(--display);font-size:26px;font-weight:600;color:var(--cream);margin-bottom:4px}
.home .lead{color:var(--ink-soft);font-size:13.5px;margin-bottom:26px}
.zone{margin-bottom:28px}
.zone-hd{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.zh-title{font-family:var(--display);font-size:18px;font-weight:600;color:var(--cream)}
.zh-badge{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.zh-badge.official{background:var(--gold);color:#3A0A0A}
.zh-badge.binder{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line)}
.zh-line{flex:1;height:1px;background:var(--line)}
.zh-desc{color:var(--ink-soft);font-size:12.5px;margin:0 0 12px;max-width:65ch}
.topic-list{display:flex;flex-direction:column;gap:5px}
.trow{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border-radius:9px;cursor:pointer;border:1px solid transparent;border-left:3px solid rgba(70,39,31,.6);transition:all .15s}
.trow:hover{background:var(--surface-2)}
.trow.official{border-left-color:var(--gold)}
.trow-num{font-family:var(--display);font-size:11px;font-weight:600;color:var(--ink-soft);width:30px;flex-shrink:0}
.trow.official .trow-num{color:var(--gold)}
.trow-body{flex:1;min-width:0}
.trow-name{font-size:13.5px;font-weight:600;color:var(--ink)}
.trow-sub{font-size:11.5px;color:var(--ink-soft);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trow-aud{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;background:rgba(241,234,216,.06);border-radius:20px;color:var(--ink-soft);flex-shrink:0;white-space:nowrap}
.chev{color:var(--ink-soft);opacity:.35;flex-shrink:0;font-size:14px}

/* DECK */
.deck{flex:1;display:flex;flex-direction:column;overflow:hidden}
.deck-hdr{padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-shrink:0}
.back-btn{padding:5px 10px;border-radius:6px;background:rgba(241,234,216,.07);color:var(--ink-soft);font-size:12.5px;font-weight:500;transition:background .15s;white-space:nowrap}
.back-btn:hover{background:rgba(241,234,216,.12);color:var(--ink)}
.deck-crumb{font-size:12.5px;color:var(--ink-soft);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-body{flex:1;display:flex;overflow:hidden}

/* GOLDEN RATIO: 61.8% content / 38.2% rail */
.slide-pane{flex:0 0 61.8%;width:61.8%;overflow-y:auto;padding:26px 30px 20px}
.rail{flex:0 0 38.2%;width:38.2%;background:var(--surface);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
/* Rail sub-split: 61.8% image zone / 38.2% meta zone */
.rail-img{flex:0 0 61.8%;background:var(--surface-2);display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
.rail-symbol{font-size:64px;opacity:.15;user-select:none;line-height:1}
.rail-section-lbl{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);opacity:.35}
.rail-meta{flex:1;padding:18px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
.rail-topic{font-family:var(--display);font-size:15px;font-weight:600;color:var(--cream);line-height:1.3;margin-bottom:6px}
.rail-aud{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(241,234,216,.07);color:var(--ink-soft);margin-bottom:10px}
.rail-aud.gold{background:rgba(244,178,22,.11);color:var(--gold)}
.rail-prog{font-size:11px;color:var(--ink-soft)}
.rail-prog strong{color:var(--ink)}

/* SLIDE CONTENT TYPES */
.s-title{font-family:var(--display);font-size:22px;font-weight:600;color:var(--cream);margin-bottom:18px;line-height:1.25}
.s-p{font-size:14px;line-height:1.65;color:var(--ink);margin-bottom:13px}
.s-ul{list-style:none;margin-bottom:13px;display:flex;flex-direction:column;gap:6px}
.s-ul li{font-size:13.5px;line-height:1.55;color:var(--ink);padding-left:18px;position:relative}
.s-ul li::before{content:"—";position:absolute;left:0;color:var(--ink-soft);opacity:.45}
.s-lbl{font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin:16px 0 7px;padding-bottom:5px;border-bottom:1px solid var(--line)}
.s-big{font-family:var(--display);font-size:17px;font-weight:600;color:var(--cream);line-height:1.35;padding:13px 16px;border-left:4px solid var(--gold);background:rgba(244,178,22,.055);border-radius:0 8px 8px 0;margin-bottom:13px;white-space:pre-line}
.s-note{padding:11px 14px;background:var(--note-bg);border-radius:7px;color:var(--note-tx);font-size:13px;line-height:1.55;margin-bottom:13px}
.s-warn{padding:11px 14px;background:var(--warn-bg);border-radius:7px;color:var(--warn-tx);font-size:13px;line-height:1.55;margin-bottom:13px;border-left:3px solid rgba(229,57,43,.4)}
.s-quote{padding:13px 16px;border-left:3px solid rgba(241,234,216,.18);background:rgba(241,234,216,.035);border-radius:0 7px 7px 0;font-style:italic;font-size:13px;line-height:1.62;color:var(--ink-soft);margin-bottom:13px}
.s-src{font-size:11px;color:var(--ink-soft);opacity:.5;margin-top:16px;padding-top:11px;border-top:1px solid var(--line);font-style:italic}
table.s-tbl{width:100%;border-collapse:collapse;margin-bottom:13px;font-size:13px}
table.s-tbl th{background:var(--surface-2);color:var(--ink-soft);font-weight:700;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;padding:7px 11px;text-align:left;border:1px solid var(--line)}
table.s-tbl td{padding:8px 11px;border:1px solid var(--line);vertical-align:top;color:var(--ink);line-height:1.5}
table.s-tbl tr:nth-child(even) td{background:rgba(241,234,216,.02)}

/* DECK NAV */
.deck-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--surface);border-top:1px solid var(--line);flex-shrink:0;margin-bottom:20px}
.nav-btn{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:600;transition:all .15s}
.nav-btn.prev{background:rgba(241,234,216,.07);color:var(--ink-soft)}
.nav-btn.prev:hover:not([disabled]){background:rgba(241,234,216,.11);color:var(--ink)}
.nav-btn.nxt{background:var(--red);color:#fff}
.nav-btn.nxt:hover:not([disabled]){background:var(--red-deep)}
.nav-btn[disabled]{opacity:.22;cursor:default}
.nav-ctr{font-size:12.5px;color:var(--ink-soft)}
.nav-ctr strong{color:var(--ink)}

/* SEARCH */
.sr-list{flex:1;overflow-y:auto;padding:12px 18px}
.sr-item{padding:10px 13px;background:var(--surface);border-radius:7px;cursor:pointer;margin-bottom:5px;border:1px solid var(--line);transition:background .15s}
.sr-item:hover{background:var(--surface-2)}
.sr-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.sr-meta{font-size:11.5px;color:var(--ink-soft)}
.sr-none{padding:24px;text-align:center;color:var(--ink-soft);font-size:13px}

@media(max-width:860px){
  .sidebar{width:230px;flex:0 0 230px}
  .slide-pane{flex:0 0 100%;width:100%}
  .rail{display:none}
  .home{padding:18px 18px}
}

/* ── Sidebar topic nav ──────────────────────────────────────── */
.nav-sec-hdr{display:flex;align-items:center;gap:8px;padding:10px 8px 5px;cursor:pointer;margin-top:6px}
.nav-sec-hdr:first-child{margin-top:0}
.nav-sec-icon{font-size:14px}
.nav-sec-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:rgba(241,234,216,.45)}
.ni{display:flex;align-items:center;gap:7px;padding:7px 8px 7px 10px;border-radius:7px;cursor:pointer;transition:background .15s;margin-bottom:1px}
.ni:hover{background:rgba(241,234,216,.06)}
.ni.active{background:rgba(241,234,216,.1)}
.ni.active .ni-lbl{color:var(--tca,#F4B216)}
.ni.active .ni-num{color:var(--tca,#F4B216)}
.ni-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;opacity:.85}
.ni-num{font-size:10px;font-weight:700;color:var(--ink-soft);flex-shrink:0;width:26px}
.ni-lbl{font-size:12px;color:var(--ink-soft);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}


.nav-btn.nxt{background:var(--accent);color:var(--accent-deep);border-color:var(--accent)}
.nav-btn.nxt:hover:not(:disabled){background:var(--accent);filter:brightness(1.1)}
.rail-prog strong{color:var(--accent)}
.s-tbl th{background:var(--accent);color:var(--accent-deep)}

/* ── Quiz ─────────────────────────────────────────────────── */
.quiz-wrap{padding:28px 32px;max-width:680px}
.quiz-title{font-family:var(--display);font-size:22px;font-weight:600;color:var(--accent);margin-bottom:20px}
.quiz-q{margin-bottom:26px}
.quiz-q-text{font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.4}
.quiz-q-num{display:inline-block;width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--accent-deep);font-size:11px;font-weight:700;text-align:center;line-height:22px;margin-right:8px;flex-shrink:0}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{display:flex;align-items:flex-start;gap:10px;padding:9px 13px;border-radius:7px;border:1.5px solid var(--line);cursor:pointer;font-size:14px;transition:border-color .15s,background .15s}
.quiz-opt:hover{border-color:var(--accent);background:rgba(244,178,22,.06)}
.quiz-opt.selected{border-color:var(--accent);background:rgba(244,178,22,.12)}
.quiz-opt.correct{border-color:#5CBD7A;background:rgba(92,189,122,.12);color:#9FD6B4}
.quiz-opt.wrong{border-color:var(--red);background:rgba(229,57,43,.1);color:#FF9080}
.quiz-submit{margin-top:22px;padding:11px 28px;background:var(--accent);color:var(--accent-deep);border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;border:none}
.quiz-submit:disabled{opacity:.4;cursor:default}
.quiz-result{margin-top:28px;padding:18px 22px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line)}
.quiz-score-lbl{font-family:var(--display);font-size:28px;font-weight:700;color:var(--accent);margin-bottom:6px}
.quiz-retake{margin-top:14px;padding:9px 22px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft)}
.quiz-retake:hover{border-color:var(--accent);color:var(--accent)}

</style>
</head>

<script>
const C = __CONTENT__;
const M = __MOTIFS__;
const main = document.getElementById('main');
const sidenav = document.getElementById('sidenav');
const srch = document.getElementById('srch');
let dSec='', dTopic=0, dSlide=0;

// NAV
function buildNav(){
  sidenav.innerHTML='';
  Object.entries(C).forEach(([k,s])=>{
    const sec=document.createElement('div');
    sec.className='nav-sec-hdr';
    sec.innerHTML=`<span class="nav-sec-icon">${s.icon}</span><span class="nav-sec-lbl">${s.title}</span>`;
    sec.onclick=()=>{srch.value='';showSection(k);};
    sidenav.appendChild(sec);
    s.topics.forEach((t,ti)=>{
      const el=document.createElement('div');
      el.className='ni'; el.dataset.k=k; el.dataset.ti=ti;
      el.innerHTML=`<span class="ni-dot" style="background:${t.ca||'#F4B216'}"></span><span class="ni-num">${t.num}</span><span class="ni-lbl">${t.name}</span>`;
      el.onclick=()=>{srch.value='';openTopic(k,ti,0);};
      sidenav.appendChild(el);
    });
  });
}
function setNav(sk,ti){
  document.querySelectorAll('.ni').forEach(n=>{
    n.classList.toggle('active', n.dataset.k===sk && parseInt(n.dataset.ti)===(ti||0) && sk!=='');
  });
}

// HOME
function goHome(){
  setNav('');
  let h=`<div class="home"><h1>Now &amp; Forever</h1><p class="lead">Manager &amp; Officer Reference · Khawarsons Convenience</p>`;
  Object.entries(C).forEach(([k,s])=>{
    h+=`<div class="zone">
      <div class="zone-hd">
        <span class="zh-title">${s.icon} ${s.title}</span>
        <span class="zh-badge ${s.tier||'binder'}">${s.tier==='official'?'Required by Law':'Operations'}</span>
        <div class="zh-line"></div>
      </div>
      <p class="zh-desc">${s.desc}</p>
      <div class="topic-list">${s.topics.map((t,i)=>trow(k,t,i)).join('')}</div>
    </div>`;
  });
  h+='</div>';
  main.innerHTML=h;
  bindRows();
}

function showSection(k){
  setNav(k);
  const s=C[k];
  main.innerHTML=`<div class="home">
    <h1>${s.icon} ${s.title}</h1>
    <p class="lead">${s.desc}</p>
    <div class="zone"><div class="topic-list">${s.topics.map((t,i)=>trow(k,t,i)).join('')}</div></div>
  </div>`;
  bindRows();
}

function trow(sk,t,i){
  const ca=t.ca||'#F4B216', cd=t.cd||'#5A3A06';
  return `<div class="trow ${t.official?'official':''}" data-sk="${sk}" data-i="${i}" style="border-left:3px solid ${ca};--accent:${ca};--accent-deep:${cd}">
    <span class="trow-num" style="color:${ca}">${t.num}</span>
    <div class="trow-body">
      <div class="trow-name">${t.name}</div>
      <div class="trow-sub">${t.sub}</div>
    </div>
    <span class="trow-aud">${t.audience}</span>
    <span class="chev" style="color:${ca}">›</span>
  </div>`;
}

function bindRows(){
  document.querySelectorAll('.trow').forEach(r=>{
    r.onclick=()=>openTopic(r.dataset.sk,parseInt(r.dataset.i),0);
  });
}

// DECK
function openTopic(sk,ti,si){dSec=sk;dTopic=ti;dSlide=si;renderDeck();}
function renderQuiz(qs,accent,accentDeep){
  const qHtml=qs.map((q,qi)=>`
    <div class="quiz-q" id="qq${qi}">
      <div class="quiz-q-text"><span class="quiz-q-num">${qi+1}</span>${q.q}</div>
      <div class="quiz-opts">
        ${q.opts.map((o,oi)=>`<div class="quiz-opt" data-qi="${qi}" data-oi="${oi}">${o}</div>`).join('')}
      </div>
    </div>`).join('');
  return `<div class="quiz-wrap">
    <div class="quiz-title">📝 Knowledge Check</div>
    ${qHtml}
    <button class="quiz-submit" id="qSubmit" disabled>Submit Answers</button>
    <div class="quiz-result" id="qResult" style="display:none"></div>
  </div>`;
}
function bindQuiz(qs){
  const sel={};
  document.querySelectorAll('.quiz-opt').forEach(el=>{
    el.onclick=()=>{
      const qi=parseInt(el.dataset.qi);
      document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`).forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
      sel[qi]=parseInt(el.dataset.oi);
      document.getElementById('qSubmit').disabled=Object.keys(sel).length<qs.length;
    };
  });
  document.getElementById('qSubmit').onclick=()=>{
    let score=0;
    qs.forEach((q,qi)=>{
      document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`).forEach(el=>{
        const oi=parseInt(el.dataset.oi);
        if(oi===q.ans){el.classList.add('correct');}
        else if(el.classList.contains('selected')&&oi!==q.ans){el.classList.add('wrong');}
        el.style.pointerEvents='none';
      });
      if(sel[qi]===q.ans) score++;
    });
    document.getElementById('qSubmit').style.display='none';
    const pct=Math.round(score/qs.length*100);
    const msg=pct===100?'Perfect — you know this topic cold. 🔥':pct>=80?'Strong. Review any misses before your next shift.':pct>=60?'Decent. Spend some time on the slides you missed.':'Review this topic carefully before serving customers.';
    document.getElementById('qResult').style.display='block';
    document.getElementById('qResult').innerHTML=`<div class="quiz-score-lbl">${score} / ${qs.length} &nbsp;(${pct}%)</div><p style="color:var(--ink-soft);font-size:14px">${msg}</p><button class="quiz-retake" id="qRetake">Retake Quiz</button>`;
    document.getElementById('qRetake').onclick=()=>{openTopic(dSec,dTopic,dSlide);};
  };
}

function renderDeck(){
  const sec=C[dSec], t=sec.topics[dTopic];
  const hasQuiz=t.quiz&&t.quiz.length>0;
  const realSlides=t.slides, total=realSlides.length+(hasQuiz?1:0);
  const isQuiz=hasQuiz&&dSlide===total-1;
  const slides=realSlides, slide=isQuiz?null:slides[dSlide];
  const mot=M[t.motif]||M[sec.motif]||M['law'];
  const accent=t.ca||'#F4B216', accentDeep=t.cd||'#5A3A06';
  setNav(dSec,dTopic);
  let body='';
  if(isQuiz){
    body=renderQuiz(t.quiz,accent,accentDeep);
  } else {
    body=`<h2 class="s-title">${slide.t}</h2>`;
    (slide.body||[]).forEach(item=>{
      if(typeof item==='string'){body+=`<p class="s-p">${item}</p>`;}
      else if(Array.isArray(item)){body+='<ul class="s-ul">'+item.map(b=>`<li>${b}</li>`).join('')+'</ul>';}
      else if(item.h&&item.rows){
        body+='<table class="s-tbl"><thead><tr>'+item.h.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'+
          item.rows.map(row=>'<tr>'+row.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
      }else if(item.label){body+=`<div class="s-lbl">${item.label}</div>`;}
      else if(item.big){body+=`<div class="s-big">${item.big}</div>`;}
      else if(item.note){body+=`<div class="s-note">ℹ️ ${item.note}</div>`;}
      else if(item.warn){body+=`<div class="s-warn">⚠️ ${item.warn}</div>`;}
      else if(item.quote){body+=`<div class="s-quote">${item.quote}</div>`;}
      else if(item.src){body+=`<div class="s-src">📎 ${item.src}</div>`;}
    });
  }
  main.innerHTML=`<div class="deck" style="--accent:${accent};--accent-deep:${accentDeep}">
    <div class="deck-hdr">
      <button class="back-btn" id="backBtn">← Back</button>
      <span class="deck-crumb">${t.num} · ${isQuiz?'Knowledge Check':slide.k||t.name}</span>
    </div>
    <div class="deck-body">
      <div class="slide-pane">${body}</div>
      <div class="rail">
        <div class="rail-img" style="${mot.img?'background:url('+mot.img+') center/cover no-repeat':''}">
          ${mot.img?'':'<span class="rail-symbol">'+mot.symbol+'</span>'}
          <span class="rail-section-lbl" style="${mot.img?'opacity:.8;background:rgba(0,0,0,.35);width:100%;text-align:center;padding:4px 0;position:absolute;bottom:0':''}"> ${sec.title}</span>
        </div>
        <div class="rail-meta">
          <div>
            <span class="rail-aud ${t.official?'gold':''}">${t.audience}</span>
            <div class="rail-topic">${t.name}</div>
          </div>
          <div class="rail-prog">Slide <strong>${dSlide+1}</strong> of <strong>${total}</strong></div>
        </div>
      </div>
    </div>
    <div class="deck-nav">
      <button class="nav-btn prev" id="prevBtn" ${dSlide===0?'disabled':''}>← Prev</button>
      <span class="nav-ctr">${isQuiz?"📝 Quiz":`<strong>${dSlide+1}</strong> / ${total}`}</span>
      <button class="nav-btn nxt" id="nxtBtn" ${dSlide===total-1?'disabled':''}>Next →</button>
    </div>
  </div>`;
  document.getElementById('backBtn').onclick=()=>showSection(dSec);
  document.getElementById('prevBtn').onclick=()=>{dSlide--;renderDeck();};
  document.getElementById('nxtBtn').onclick=()=>{dSlide++;renderDeck();};
  if(isQuiz&&t.quiz) bindQuiz(t.quiz);
}

// SEARCH
srch.addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q){goHome();return;}
  const results=[];
  Object.entries(C).forEach(([sk,sec])=>{
    sec.topics.forEach((t,ti)=>{
      t.slides.forEach((slide,si)=>{
        const txt=[slide.t,slide.k,...(slide.body||[]).map(b=>
          typeof b==='string'?b:Array.isArray(b)?b.join(' '):JSON.stringify(b)
        )].join(' ').toLowerCase();
        if(txt.includes(q)) results.push({sk,ti,si,tName:t.name,sTitle:slide.t,num:t.num,secTitle:sec.title});
      });
    });
  });
  setNav('');
  if(!results.length){
    main.innerHTML=`<div class="home"><p class="sr-none">No results for "<strong>${q}</strong>"</p></div>`;
    return;
  }
  const items=results.map(r=>
    `<div class="sr-item" data-sk="${r.sk}" data-ti="${r.ti}" data-si="${r.si}">
      <div class="sr-name">${r.num} · ${r.tName} — ${r.sTitle}</div>
      <div class="sr-meta">${r.secTitle}</div>
    </div>`).join('');
  main.innerHTML=`<div class="home"><h1>Search</h1><p class="lead">${results.length} result${results.length!==1?'s':''} for "<strong>${q}</strong>"</p></div><div class="sr-list">${items}</div>`;
  document.querySelectorAll('.sr-item').forEach(el=>{
    el.onclick=()=>openTopic(el.dataset.sk,parseInt(el.dataset.ti),parseInt(el.dataset.si));
  });
});

buildNav(); goHome();
</script>
</body>
