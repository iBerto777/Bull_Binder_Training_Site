<script>
const C = {"official": {"title": "Training Required by Law", "icon": "⚖️", "motif": "law", "tier": "official", "desc": "Eight legally-required topics — primary-source content, scrutinized, and cited.", "topics": [{"name": "TABC — Alcohol Server Training", "sub": "Certification · ID · hours · intoxication · liability · SB 650", "audience": "All Officers & Captains", "num": "O1", "official": true, "slides": [{"k": "TABC · Overview", "t": "Alcohol Server Training", "body": ["TABC is the Texas Alcoholic Beverage Commission — the state agency that regulates every alcohol sale in Texas.", "The Seller-Server Certification is your individual credential proving you know Texas alcohol law and how to serve responsibly.", {"big": "Every Officer and Captain who sells alcohol must be certified before touching a sale. No exceptions."}, {"h": ["At a glance", "Detail"], "rows": [["Audience", "All Officers & Captains who sell or serve alcohol"], ["Credential", "TABC Seller-Server Certification (individual)"], ["Approved providers", "360training.com · Learn2Serve · other TABC-approved"], ["Valid for", "2 years, then renew"], ["N&F policy", "Certified before first alcohol sale · within 30 days of hire at the latest"]]}, {"src": "Tex. Alco. Bev. Code §106.14 · TABC Seller-Server Program · tabc.texas.gov"}]}, {"k": "TABC · Why It Matters", "t": "Why This Training Exists", "body": ["Selling alcohol is the highest-liability transaction in the store. One bad sale can cost the Officer, the Captain, and the company.", "In 2022, an 18-year-old bought alcohol at a Texas convenience store using a fake ID — across multiple clerks — and died in a crash that night. His mother's advocacy became SB 650, the Deshawn Jagwan Act.", {"big": "Texas has one of the highest rates of underage drunk-driving deaths in the country. At the register, you are the front line."}, {"note": "Get it right every time. There is no undo button after a crash."}, {"src": "SB 650 (88th Leg., 2023) · NHTSA Texas Crash Data · tabc.texas.gov"}]}, {"k": "TABC · Certification", "t": "How to Get Certified", "body": ["TABC seller-server certification is taken online through any TABC-approved provider. The course covers Texas alcohol law, ID checking, intoxication recognition, and liability.", {"h": ["Step", "Action"], "rows": [["1", "Go to tabc.texas.gov → Seller-Server Training → Find a Provider"], ["2", "Complete the approved course (typically 2–3 hours online)"], ["3", "Pass the exam (usually 75% passing score)"], ["4", "Print or save your certificate — present to N&F management"], ["5", "Re-certify every 2 years"]]}, {"note": "Recommended providers: 360training.com · learn2serve.com — both TABC-approved and available 24/7."}, {"warn": "You may NOT complete a sale involving alcohol until your certificate is on file with management."}, {"src": "TABC Seller-Server Certification Program · tabc.texas.gov/training"}]}, {"k": "TABC · ID Checking", "t": "When and How to Check ID", "body": ["Any time a customer presents alcohol for purchase, check ID if they appear to be under 30. Texas law requires ID verification for anyone who appears to be a minor.", {"h": ["Rule", "Detail"], "rows": [["Age minimum", "21 years old to purchase alcohol"], ["Who to card", "Anyone who appears under 30 — this is the N&F standard"], ["Acceptable ID", "Texas DL/ID · US Passport · US Military ID · Permanent Resident Card"], ["Not acceptable", "Expired ID · foreign ID alone · student ID · birth certificate"], ["Fake ID", "Confiscate if possible · call police · document the attempt"]]}, {"label": "What to look for on the ID"}, ["Birth date — calculate age right now, not just glance at the year", "Expiration date — expired ID is not valid under any circumstance", "Photo match — does the face match the person in front of you?", "Security features — feel for raised print, check the ghost image and UV markings"], {"note": "When in doubt, don't sell. Refusing a sale for age is always legally safe. Making a bad sale is not."}, {"src": "Tex. Alco. Bev. Code §106.03 · §106.06 · TABC ID Checking Guide"}]}, {"k": "TABC · Intoxication", "t": "Recognizing an Intoxicated Customer", "body": ["Texas law prohibits selling alcohol to a person who is visibly intoxicated. Knowing the signs protects you from liability.", {"label": "Physical signs"}, ["Slurred or slowed speech", "Bloodshot, glassy, or unfocused eyes", "Flushed face or unsteady balance", "Difficulty with motor skills — fumbling for wallet, dropping items", "Strong odor of alcohol"], {"label": "Behavioral signs"}, ["Boisterous, aggressive, or unusually loud", "Disoriented or confused — can't identify where they are", "Repeating themselves or unable to follow simple conversation", "Stumbling or needing to support themselves against shelves or counter"], {"warn": "If you suspect intoxication, refuse the sale. Say: 'I'm not able to sell alcohol today — I hope you understand.' Keep it short and calm. Do not argue."}, {"note": "Document the refusal on your shift log: date, time, brief description, what you said."}, {"src": "Tex. Alco. Bev. Code §101.63 · TABC Intoxication Recognition Training"}]}, {"k": "TABC · Straw Purchases", "t": "Third-Party and Straw Purchases", "body": ["A straw purchase is when an adult buys alcohol intending to give or sell it to a minor. This is illegal — and you can be held liable.", {"big": "Watch for groups where a younger-looking person coaches the buyer, or waits outside while someone else buys."}, {"h": ["Red flag", "What it means"], "rows": [["Customer looks back at a companion outside", "May be a straw purchase signal"], ["Customer buys immediately after a minor was refused", "Classic straw purchase pattern"], ["Two people arrive together — one buys, one waits near entrance", "Evaluate carefully"], ["Customer seems rushed or says 'it's for a friend'", "Use your judgment — can be innocent, can be a flag"]]}, {"note": "You are not required to be a detective. But you are required to use reasonable care. When something feels wrong, it probably is."}, {"warn": "Knowingly facilitating a straw purchase can result in personal criminal charges and TABC license action against the store."}, {"src": "Tex. Alco. Bev. Code §106.06 · TABC Enforcement Policies"}]}, {"k": "TABC · Safe Harbor", "t": "The Safe Harbor Defense", "body": ["Texas law provides a Safe Harbor defense for sellers who follow the rules. This defense can eliminate personal criminal liability even if the buyer was underage.", {"quote": "Under §106.14, it is a defense to prosecution that the defendant: (1) requested and received identification showing the purchaser to be 21 or older, (2) the identification reasonably appeared to be valid, and (3) the defendant sold the alcohol in reliance on that identification."}, {"label": "To qualify for Safe Harbor, all of these must be true"}, ["You asked for ID", "You received an ID that reasonably appeared valid", "You verified the ID — photo, birthdate, expiration, security features", "You acted in good faith — no obvious red flags ignored", "You are TABC certified at the time of the sale"], {"warn": "Safe Harbor does NOT apply if you ignored obvious red flags, accepted a clearly altered ID, or knowingly sold to a minor."}, {"src": "Tex. Alco. Bev. Code §106.14 · TABC Training Program Materials"}]}, {"k": "TABC · Liability", "t": "Personal and Company Liability", "body": ["TABC certification reduces but does not eliminate liability. Certification creates a defense — if you acted in good faith and followed all protocols, your personal exposure is reduced.", {"h": ["Violation", "Potential consequence"], "rows": [["Selling to a minor", "Class A misdemeanor (up to 1 year jail, $4,000 fine) — personal"], ["Selling to an intoxicated person", "Up to $4,000 fine, license suspension — personal + store"], ["Store license violation", "TABC license suspension or cancellation"], ["Injury or death caused by over-service", "Civil dram shop liability — potentially millions"], ["Pattern of violations", "TABC license revocation"]]}, {"label": "Dram Shop Act"}, "Under Texas's Dram Shop Act, a provider who sells alcohol to an intoxicated person who then causes injury can be held civilly liable.", {"src": "Tex. Alco. Bev. Code §106.14 · §2.02 (Dram Shop Act) · TABC Enforcement"}]}, {"k": "TABC · Sale Hours", "t": "Alcohol Sale Hours in Texas", "body": ["Texas law restricts when you can sell alcohol. Violations carry immediate consequences.", {"h": ["Day", "Allowed sale hours"], "rows": [["Monday – Friday", "7:00 AM – Midnight"], ["Saturday", "7:00 AM – 1:00 AM Sunday morning"], ["Sunday", "Noon – Midnight"], ["New Year's Day (Jan 1)", "Midnight (Jan 1) – 2:00 AM, then resume normal"], ["Election Day", "No restriction (old law repealed in 2017)"]]}, {"warn": "Off-hours sales are a TABC criminal violation — not just a policy issue. The clock on the POS is the official record. Do not override it."}, {"note": "The POS system is configured to block alcohol sales outside legal hours. If the POS allows a sale you believe is after hours, stop and call your Captain immediately."}, {"src": "Tex. Alco. Bev. Code §105.05 · §105.06 · TABC Sale Hours Reference"}]}, {"k": "TABC · SB 650", "t": "SB 650 — The Deshawn Jagwan Act", "body": ["SB 650, signed in 2023 and effective September 1, 2025, requires all alcohol retailers to use an electronic ID scanner for every alcohol sale.", {"h": ["SB 650 detail", "Requirement"], "rows": [["What it requires", "Electronic ID scanner used on every alcohol sale"], ["Who it covers", "All alcohol retailers — convenience stores, grocery, restaurants"], ["Who is exempt", "Package stores (liquor stores)"], ["Criminal liability effective", "September 1, 2025"], ["TABC enforcement effective", "September 1, 2027"], ["Who bears liability", "Individual seller and the licensed establishment"]]}, {"big": "Scanning is now mandatory. 'The scanner was down' is not an excuse — if you can't scan, you cannot sell alcohol."}, {"warn": "From September 1, 2025: selling alcohol without scanning ID is a criminal offense at the individual level."}, {"note": "This law is covered in full under O2 (Electronic ID Scanner). This slide is the connection point between TABC and SB 650."}, {"src": "Texas SB 650 (88th Legislature, 2023) · Signed by Governor Abbott · Effective Sept 1, 2025"}]}, {"k": "TABC · Refusals", "t": "How to Refuse a Sale", "body": ["Refusing a sale — for age, intoxication, or inability to verify — is always legally safe. Making a bad sale is not.", {"label": "Phrases that work"}, ["'I'm not able to sell alcohol without a valid ID.'", "'I'm not able to sell alcohol today — I hope you understand.'", "'My manager needs to approve this — let me call them over.'"], {"label": "What to do after a refusal"}, ["Log it: date, time, brief description, reason, what you said", "Notify your Captain if the customer becomes aggressive or threatening", "Do not argue — say your line, stay calm, move on", "If the customer becomes threatening, call police"], {"note": "Keeping a refusal log gives management data, supports Safe Harbor, and documents that you followed procedure."}, {"src": "N&F Operations Policy · TABC Best Practices · §106.14 documentation standards"}]}, {"k": "TABC · Quick Reference", "t": "Quick Reference Card", "body": [{"big": "CARD EVERY CUSTOMER WHO APPEARS UNDER 30"}, {"h": ["Situation", "Action"], "rows": [["Customer appears under 30", "Ask for ID before completing sale"], ["ID is expired", "Refuse — expired ID is not valid"], ["ID doesn't match description", "Refuse — document, report to Captain"], ["Fake ID suspected", "Confiscate if safe · call police · document"], ["Customer appears intoxicated", "Refuse · use refusal phrase · log it"], ["Straw purchase suspected", "Refuse the whole transaction"], ["After midnight Saturday", "No sale — POS should block"], ["Scanner is down", "No alcohol sales until scanner is operational"]]}, {"warn": "When in doubt — do not sell. Every refused sale is the right call."}, {"src": "N&F Training Policy · TABC Seller-Server Program · SB 650 (2025)"}]}], "ca": "#E2B55A", "cd": "#413316", "quiz": [{"q": "What is the minimum age to purchase alcohol in Texas?", "opts": ["18", "19", "21", "25"], "ans": 2}, {"q": "Under Safe Harbor (§106.14), what must a seller do to be protected from criminal liability?", "opts": ["Refuse any suspicious customer", "Request and verify a valid ID in good faith", "Call the police if unsure", "Only sell to known customers"], "ans": 1}, {"q": "What are Texas alcohol sale hours on Sunday?", "opts": ["7 AM – midnight", "10 AM – midnight", "Noon – midnight", "No sales on Sunday"], "ans": 2}, {"q": "A straw purchase occurs when:", "opts": ["A minor uses a fake ID", "An adult buys alcohol intending to give it to a minor", "A customer pays with cash", "Someone buys beer and wine together"], "ans": 1}, {"q": "Under the Dram Shop Act, a store can be liable if:", "opts": ["It sells alcohol after 10 PM", "It sells to someone who is obviously intoxicated and they cause injury", "A customer complains about the price", "It fails to display the TABC license"], "ans": 1}]}, {"name": "Electronic ID Scanner", "sub": "SB 650 · scan every sale · scanner-down protocol · penalties", "audience": "All Officers & Captains", "num": "O2", "official": true, "slides": [{"k": "ID Scanner · Overview", "t": "Electronic ID Scanner — Required by Law", "body": ["Texas SB 650 (the Deshawn Jagwan Act) requires an electronic ID scanner for every alcohol sale. This is no longer optional.", {"h": ["SB 650 at a glance", "Detail"], "rows": [["Law", "Texas SB 650, 88th Legislature (2023)"], ["Named for", "Deshawn Jagwan — died in a drunk-driving crash at 18 after buying alcohol with a fake ID"], ["What it requires", "Electronic scan of ID on every alcohol sale"], ["Criminal liability", "September 1, 2025"], ["TABC enforcement", "September 1, 2027"], ["Who is covered", "All alcohol retailers except licensed package stores"], ["Who is exempt", "Package stores (liquor stores)"]]}, {"big": "No scan = no sale. This is the rule. There are no exceptions."}, {"src": "Texas SB 650 (88th Leg., 2023) · Effective Sept 1, 2025 · tabc.texas.gov"}]}, {"k": "ID Scanner · How to Use", "t": "Using the Scanner Correctly", "body": ["The scanner reads the barcode or magnetic stripe on the back of a driver's license or state ID and verifies age automatically.", {"h": ["Step", "Action"], "rows": [["1", "Ask the customer to hand you their ID or swipe it themselves"], ["2", "Scan the barcode on the back (or swipe the magnetic stripe)"], ["3", "Read the result — screen shows PASS (21+) or FAIL (under 21 or invalid)"], ["4", "Cross-check — visually verify the photo matches the person"], ["5", "Proceed with sale (PASS) or refuse (FAIL)"]]}, {"note": "A PASS from the scanner is not the end of the check. You still verify the photo and confirm the ID is not altered or fake."}, {"warn": "Never skip the visual check. A PASS on a fake ID is still your liability if you had obvious reason to doubt the ID."}, {"src": "SB 650 Implementation Guidance · TABC Enforcement FAQ · N&F Operations Policy"}]}, {"k": "ID Scanner · Results", "t": "Understanding Scanner Results", "body": [{"h": ["Result", "What it means", "What to do"], "rows": [["PASS — green", "ID verified, customer is 21+", "Complete visual check, proceed with sale"], ["FAIL — red", "Customer is under 21, or ID is expired/invalid", "Refuse the sale — log it"], ["UNREADABLE — yellow", "Barcode or stripe could not be read", "Try again; if still unreadable, use manual protocol"], ["TAMPERED — red", "Scanner detected signs of modification", "Confiscate if safe · call police · notify Captain"]]}, {"note": "A FAIL is not an accusation — it is a system result. Stay calm. Use your refusal phrase."}, {"warn": "Do not attempt to override or bypass a FAIL result under any circumstance. The scanner log is permanent."}, {"src": "Scanner manufacturer documentation · SB 650 implementation guide · N&F policy"}]}, {"k": "ID Scanner · Scanner Down", "t": "Scanner Down Protocol", "body": ["If the scanner is malfunctioning, offline, or unavailable, the protocol is simple:", {"big": "No working scanner = no alcohol sales. Period."}, {"h": ["Situation", "Action"], "rows": [["Scanner won't power on", "Notify Captain immediately — halt alcohol sales"], ["Scanner powers on but won't connect", "Notify Captain — halt alcohol sales"], ["Scanner errors on every ID", "Assume scanner is down — halt and notify Captain"], ["Power outage", "No alcohol sales"], ["You are unsure if the scanner is working", "Halt and notify Captain — not worth the risk"]]}, {"note": "The scanner log creates a timestamped record. A gap in scan records during a period of sales is a compliance red flag."}, {"warn": "Telling a customer 'the scanner is down so I can still sell' is a SB 650 criminal violation as of September 1, 2025."}, {"src": "SB 650 enforcement guidance · N&F policy · TABC compliance FAQ"}]}, {"k": "ID Scanner · Acceptable IDs", "t": "What the Scanner Accepts", "body": ["The scanner reads standard barcodes and magnetic stripes. Not every document produces a valid read.", {"h": ["ID type", "Scanner reads?", "Acceptable for sale?"], "rows": [["Texas Driver's License", "Yes", "Yes — if PASS"], ["Texas State ID Card", "Yes", "Yes — if PASS"], ["Other US State DL/ID", "Yes (most)", "Yes — if PASS"], ["US Passport (card format)", "Yes", "Yes — if PASS"], ["US Military ID", "Varies", "Manual verify if scanner can't read"], ["Permanent Resident Card (Green Card)", "Yes", "Yes — if PASS"], ["Foreign passport", "No standard barcode", "Manual process — consult Captain"], ["Expired ID (any type)", "Yes — will FAIL", "Refuse — expired is invalid"], ["Student ID", "Not applicable", "Not acceptable for alcohol"]]}, {"note": "When a valid ID type can't be scanned (military, foreign passport), follow the manual verification protocol and notify your Captain."}, {"src": "SB 650 Implementation · TABC ID Verification Standards · N&F Policy"}]}, {"k": "ID Scanner · Penalties", "t": "Consequences for Non-Compliance", "body": ["SB 650 created criminal liability at the individual level, not just the store level.", {"h": ["Violation", "Who is liable", "Consequence"], "rows": [["Selling alcohol without scanning ID", "Individual seller", "Criminal offense as of Sept 1, 2025"], ["Selling after FAIL result", "Individual seller", "Criminal offense + TABC violation"], ["Store pattern of scanner violations", "License holder", "TABC license action from Sept 1, 2027"], ["Scanner 'down' but sales continue", "Individual + management", "Criminal + civil + TABC triple exposure"]]}, {"warn": "Starting September 1, 2025: a criminal record for this offense is real and permanent. It affects your employment options for years."}, {"note": "TABC formal enforcement against stores begins September 1, 2027 — but individual criminal charges are already active."}, {"src": "Texas SB 650 (88th Leg. 2023) · Tex. Alco. Bev. Code §106 · TABC Enforcement"}]}, {"k": "ID Scanner · Quick Reference", "t": "Scanner Quick Reference Card", "body": [{"big": "SCAN EVERY ID ON EVERY ALCOHOL SALE"}, {"h": ["Situation", "Action"], "rows": [["Normal sale", "Scan ID → verify photo → proceed if PASS"], ["Scanner shows FAIL", "Refuse sale · use refusal phrase · log it"], ["Scanner shows UNREADABLE", "Try again · if still unreadable → manual protocol"], ["Scanner shows TAMPERED", "Confiscate if safe · call police · notify Captain"], ["Scanner is down", "HALT alcohol sales · notify Captain immediately"], ["Customer refuses to scan", "No scan = no sale · explain it is now the law"]]}, {"warn": "No scanner = no alcohol sales. This is non-negotiable from September 1, 2025."}, {"src": "SB 650 · N&F Operations Policy · TABC Enforcement Guidance · tabc.texas.gov"}]}], "ca": "#5AE2DC", "cd": "#16413F", "quiz": [{"q": "When did criminal liability for not using an ID scanner take effect under SB 650?", "opts": ["January 1 2024", "September 1 2025", "September 1 2027", "January 1 2026"], "ans": 1}, {"q": "What should you do if the ID scanner is down?", "opts": ["Use visual verification only", "No alcohol sales until scanner is restored", "Ask a manager for override approval", "Check ID manually and proceed"], "ans": 1}, {"q": "Package stores (liquor stores) are:", "opts": ["Required to use scanners immediately", "Exempt from the scanner requirement", "Required to use scanners after 2027", "Required to use dual scanners"], "ans": 1}, {"q": "A scanner result of TAMPERED means:", "opts": ["The ID is expired", "The barcode has been altered — refuse the sale", "The customer is underage", "The scanner needs recalibration"], "ans": 1}, {"q": "TABC enforcement of SB 650 begins:", "opts": ["September 1 2025", "January 1 2026", "September 1 2027", "When the governor signs"], "ans": 2}]}, {"name": "Tobacco & E-Cigarette Age Verification", "sub": "Tobacco 21 · products covered · carding · signage · retailer permit", "audience": "All Officers & Captains", "num": "O3", "official": true, "slides": [{"k": "Tobacco · Overview", "t": "Tobacco & E-Cigarette Age Verification", "body": ["Federal law raised the minimum age to purchase tobacco products to 21. Texas mirrors this requirement. Selling tobacco to anyone under 21 is a federal and state violation.", {"h": ["At a glance", "Detail"], "rows": [["Federal law", "Tobacco 21 — FD&C Act amendment, signed December 20, 2019"], ["Effective date", "December 20, 2019"], ["Minimum age", "21 years old to purchase any tobacco product"], ["What's covered", "Cigarettes, cigars, tobacco, e-cigarettes, vapes, nicotine pouches, hookah tobacco"], ["Texas law", "Tex. Health & Safety Code §161.082 — mirrors federal Tobacco 21"], ["N&F standard", "Card anyone who appears under 30"]]}, {"src": "Federal Food, Drug & Cosmetic Act §906(d) · Tex. Health & Safety Code §161.082 · FDA Tobacco 21"}]}, {"k": "Tobacco · Products Covered", "t": "What Tobacco 21 Covers", "body": ["Any product containing tobacco or nicotine — including electronic delivery devices — falls under Tobacco 21. The list is wider than most people assume.", {"h": ["Product", "Covered?"], "rows": [["Cigarettes (all brands)", "Yes"], ["Cigars, including little cigars and cigarillos", "Yes"], ["Pipe tobacco", "Yes"], ["Chewing tobacco, dip, snuff", "Yes"], ["E-cigarettes — Elf Bar, Vuse, Juul, Breeze, etc.", "Yes"], ["Vaping devices and prefilled cartridges", "Yes"], ["Nicotine pouches — Zyn, On!, Rogue", "Yes"], ["Hookah tobacco / shisha", "Yes"], ["Herbal cigarettes (no tobacco or nicotine)", "No"], ["Lighters, rolling papers sold alone", "No"]]}, {"note": "The FDA continues to add products to the covered list. When a new nicotine product appears and you're unsure, ask your Captain before selling it."}, {"src": "FDA Tobacco 21 FAQ · 21 U.S.C. §387f(d)(3) · Tex. Health & Safety Code §161.081"}]}, {"k": "Tobacco · Carding", "t": "How to Check ID for Tobacco", "body": ["Card any customer who appears to be under 30. This is the N&F standard — it protects you from judgment calls on borderline ages.", {"h": ["Acceptable ID", "Notes"], "rows": [["Texas Driver's License or State ID", "Must be valid — not expired"], ["Other US State DL or ID", "Must be valid — not expired"], ["US Passport (book or card)", "Valid"], ["US Military ID", "Valid"], ["Permanent Resident Card", "Valid"], ["Expired ID", "Not valid — refuse the sale"], ["Foreign ID or passport alone", "Use judgment — consult Captain if uncertain"], ["Student ID", "Not acceptable for tobacco"]]}, {"label": "The ID check — four things"}, ["Birthdate: customer must be 21 or older today — calculate it, don't estimate", "Expiration: expired means refuse, no exceptions", "Photo: does the face match the person presenting the ID?", "Condition: look for laminate bubbles, mismatched fonts, irregular print — these are alteration signs"], {"warn": "If the ID appears altered or fake, refuse the sale. You are not required to confiscate, but you may if it's safe to do so."}, {"src": "FDA Tobacco 21 · Tex. Health & Safety Code §161.082 · N&F Operations Policy"}]}, {"k": "Tobacco · Penalties", "t": "Penalties for Selling to Minors", "body": ["Selling tobacco to anyone under 21 triggers state, federal, and company-level consequences.", {"h": ["Level", "Violation", "Consequence"], "rows": [["Individual (state)", "Selling tobacco to under-21", "Class C misdemeanor · up to $500 fine per sale"], ["Store (state) — first offense", "Compliance check failure", "Fine up to $500 · corrective action plan required"], ["Store (state) — repeat violations", "Pattern of compliance failures", "Fines up to $2,000 per violation · permit suspension"], ["Store (state) — pattern", "Ongoing non-compliance", "Tobacco retailer permit revocation"], ["Store (federal FDA)", "FDA compliance check failure", "Warning → civil monetary penalties → No-Tobacco-Sale order"], ["N&F policy", "Any confirmed violation", "Immediate management review · possible termination"]]}, {"warn": "FDA conducts unannounced compliance checks using under-21 decoys. A federal violation triggers sanctions on the entire store."}, {"note": "Texas DSHS conducts its own compliance checks separately. Failures are public record and affect the store's compliance history."}, {"src": "FDA Tobacco 21 Enforcement · Tex. Health & Safety Code §161.0901 · N&F Policy"}]}, {"k": "Tobacco · Signage", "t": "Required Point-of-Sale Signage", "body": ["Texas law requires specific signage at the point of sale for tobacco products. Missing signage is a separate violation — independent of any sale.", {"h": ["Requirement", "Detail"], "rows": [["Required sign text", "'It is a violation of state law to sell or provide tobacco products to persons under 21 years of age.'"], ["Where to post", "At or near the point of sale — clearly visible to customers"], ["Language", "English required; Spanish strongly recommended"], ["Who provides it", "Texas DSHS provides free downloadable signs; or use the N&F approved version"], ["Penalty for missing sign", "Class C misdemeanor (store operator)"]]}, {"note": "Check the sign on your shift. If it is missing, damaged, or obscured, notify your Captain before the shift is over."}, {"src": "Tex. Health & Safety Code §161.0855 · Texas DSHS Tobacco Retailer Requirements"}]}, {"k": "Tobacco · Retailer Permit", "t": "Tobacco Retailer Certificate", "body": ["Texas retailers who sell cigarettes or tobacco products must hold a valid Cigarette and Tobacco Products Retailer Certificate from the Texas Comptroller.", {"h": ["Permit requirement", "Detail"], "rows": [["Issued by", "Texas Comptroller of Public Accounts"], ["Required for", "Any retail sale of cigarettes or tobacco in Texas"], ["Cost", "$0 — no fee for the retailer certificate"], ["Where to post", "Visible at or near the point of sale"], ["Renewal", "Annual"], ["Selling without permit", "Criminal penalty + permit denial"]]}, {"note": "The current permit should be posted at or near the register. If you don't see it on your shift, notify your Captain before selling any tobacco."}, {"src": "Tex. Tax Code §154.101 (cigarettes) · §155.041 (tobacco products) · Texas Comptroller Tobacco Retailer Program"}]}, {"k": "Tobacco · Quick Reference", "t": "Tobacco Quick Reference Card", "body": [{"big": "CARD ANYONE WHO APPEARS UNDER 30 — MINIMUM AGE IS 21"}, {"h": ["Situation", "Action"], "rows": [["Customer appears under 30", "Ask for ID before completing sale"], ["ID shows customer is under 21", "Refuse — use your refusal phrase"], ["ID is expired", "Refuse — expired is not valid"], ["ID appears altered", "Refuse · notify Captain"], ["Customer shows student ID", "Refuse — not acceptable for tobacco"], ["No ID presented", "Refuse"], ["Tobacco sign missing at register", "Notify Captain before shift continues"], ["Tobacco permit missing or expired", "Notify Captain immediately — do not sell tobacco"]]}, {"warn": "One bad tobacco sale can trigger an FDA compliance action that affects the entire store."}, {"src": "FDA Tobacco 21 · Tex. Health & Safety Code §161 · N&F Operations Policy"}]}], "ca": "#E25AC0", "cd": "#411636", "quiz": [{"q": "What is the federal minimum age for tobacco purchases under Tobacco 21?", "opts": ["18", "19", "21", "25"], "ans": 2}, {"q": "When did the federal Tobacco 21 law take effect?", "opts": ["January 1 2018", "December 20 2019", "March 15 2020", "January 1 2021"], "ans": 1}, {"q": "Nicotine pouches like Zyn are:", "opts": ["Not covered by Tobacco 21", "Covered under Tobacco 21 age verification", "Only regulated in California", "Exempt if no tobacco leaf present"], "ans": 1}, {"q": "Our policy is to card anyone who appears under:", "opts": ["18", "21", "25", "30"], "ans": 3}, {"q": "An individual violation of Texas tobacco age law is a:", "opts": ["Class A misdemeanor", "Class B misdemeanor", "Class C misdemeanor", "Civil infraction only"], "ans": 2}]}, {"name": "SNAP / EBT", "sub": "Lone Star Card · eligible vs ineligible · 2025–26 update · trafficking", "audience": "All Officers & Captains", "num": "O4", "official": true, "slides": [{"k": "SNAP · Overview", "t": "SNAP / EBT — The Lone Star Card", "body": ["SNAP (Supplemental Nutrition Assistance Program) is a federal benefit program. In Texas it is delivered through the Lone Star Card — a debit-style card loaded monthly with the recipient's food benefit.", {"h": ["At a glance", "Detail"], "rows": [["Federal program", "SNAP — administered by USDA Food & Nutrition Service (FNS)"], ["Texas delivery", "Lone Star Card — an EBT (Electronic Benefits Transfer) card"], ["How it works", "Customer swipes card + enters PIN · POS separates eligible items automatically"], ["PIN required", "Yes — the customer enters their own PIN — never enter it for them"], ["N&F authorization", "Both Marina and Monterey are SNAP-authorized retailers"], ["Violating SNAP rules", "Federal disqualification + fines + possible criminal prosecution"]]}, {"src": "7 U.S.C. §2011 et seq. · USDA FNS SNAP Retailer Rules · Texas HHS SNAP Program"}]}, {"k": "SNAP · Eligible Items", "t": "What SNAP Can Buy", "body": ["SNAP is restricted to foods intended for home preparation and consumption. The list is broad but has clear exclusions.", {"label": "SNAP CAN buy"}, ["Breads, cereals, rice, pasta, and other grains", "Fruits and vegetables — fresh, frozen, canned, dried", "Meat, poultry, and fish — raw or packaged", "Dairy products — milk, cheese, yogurt, eggs", "Snack foods and non-alcoholic beverages (sodas, energy drinks, candy — see 2025–26 note)", "Seeds and plants that produce food for the household"], {"note": "SNAP-eligible items are tagged in the POS system. When in doubt, ring the item — if the system rejects it from the SNAP card, the customer pays another way."}, {"src": "7 U.S.C. §2012(k) · USDA FNS Eligible Food Items · SNAP Retailer Training"}]}, {"k": "SNAP · Ineligible Items", "t": "What SNAP Cannot Buy", "body": ["These categories are excluded from SNAP by federal law. They can never be purchased with the Lone Star Card.", {"h": ["Category", "Examples"], "rows": [["Alcohol", "Beer, wine, liquor — no exceptions ever"], ["Tobacco products", "Cigarettes, e-cigarettes, vapes, chewing tobacco, cigars"], ["Hot or prepared foods", "Roller grill items · fountain drinks already poured · rotisserie items"], ["Non-food items", "Paper products, cleaning supplies, pet food, cosmetics, personal care"], ["Vitamins and medicines", "Including supplements labeled as health products"], ["Live animals", "With exceptions for fish and shellfish for home consumption"]]}, {"warn": "Accepting SNAP for alcohol or tobacco is federal SNAP trafficking — the most serious SNAP violation. First offense: permanent store disqualification. Second offense: criminal prosecution."}, {"note": "The POS system should block SNAP for ineligible items. If it doesn't, do not complete the transaction — notify management immediately."}, {"src": "7 U.S.C. §2012(k) · USDA FNS Prohibited Items · FNS Retailer Compliance"}]}, {"k": "SNAP · 2025–2026 Update", "t": "Texas SNAP Policy — 2025–2026 Updates", "body": ["Texas has been working to restrict SNAP purchases in ways the federal baseline currently allows. This is an active policy area.", {"h": ["Item / change", "Status as of 2025–2026"], "rows": [["Candy and confectionery", "Currently SNAP-eligible under federal baseline"], ["Sodas and sugar-sweetened beverages", "Currently SNAP-eligible under federal baseline"], ["Texas waiver request to USDA", "Filed to exclude candy and sweetened beverages — pending USDA approval"], ["Federal SNAP Nutrition Act proposals", "Congress considered restricting SNAP to 'nutritious' foods — watch for updates"], ["If a change takes effect", "POS system will be updated before it affects your register — wait for management notification"]]}, {"note": "Do not tell customers that candy or soda is SNAP-ineligible unless management has confirmed the waiver is approved AND the POS has been updated. The POS is the rule."}, {"warn": "Policy changes require management communication and POS updates. Do not change your behavior at the register until instructed."}, {"src": "USDA FNS Waiver Process · Texas HHS SNAP Program Communications · N&F Management Policy"}]}, {"k": "SNAP · Processing a Transaction", "t": "How to Process a SNAP Transaction", "body": ["SNAP transactions process through the POS like a debit card, but the customer enters their PIN and the system separates SNAP-eligible from ineligible items automatically.", {"h": ["Step", "Action"], "rows": [["1", "Ring up all items normally — do not separate eligible from ineligible manually"], ["2", "At payment, customer selects 'EBT / Lone Star Card'"], ["3", "Hand the card reader to the customer"], ["4", "Customer swipes their Lone Star Card and enters their PIN privately"], ["5", "POS splits the transaction: SNAP items charged to card · ineligible items remain to be paid"], ["6", "If balance is insufficient, system shows amount covered and remaining balance"], ["7", "Customer pays remaining balance by another method"], ["8", "Print receipt — both portions are shown"]]}, {"warn": "Never enter the PIN for the customer under any circumstance. The PIN is their private credential. Entering it for them is a federal violation."}, {"src": "USDA FNS EBT Transaction Processing · Texas HHS SNAP Transaction Guide · N&F POS Policy"}]}, {"k": "SNAP · Violations", "t": "SNAP Trafficking — The Worst Violation", "body": ["SNAP trafficking is exchanging SNAP benefits for cash, non-food items, alcohol, or tobacco. It is a federal crime with severe consequences.", {"h": ["Violation type", "Consequence"], "rows": [["Accepting SNAP for alcohol or tobacco", "Permanent store disqualification + federal prosecution"], ["Exchanging SNAP for cash ('cash back on SNAP')", "Same — federal criminal charges possible"], ["Selling non-food ineligible items on SNAP", "Disqualification + civil monetary penalty"], ["Individual employee trafficking", "Federal criminal conviction · imprisonment possible"], ["Store pattern of violations", "Permanent SNAP disqualification — business ending"]]}, {"big": "Losing SNAP authorization means customers who rely on benefits can no longer shop at the store. That is a business-ending event for a convenience store."}, {"warn": "USDA conducts undercover compliance checks. Officers who accept SNAP for ineligible items face termination and potential federal criminal charges."}, {"src": "7 U.S.C. §2021 · USDA FNS Retailer Compliance and Enforcement · FNS SNAP Trafficking Policy"}]}, {"k": "SNAP · Quick Reference", "t": "SNAP Quick Reference Card", "body": [{"big": "SNAP = FOOD FOR HOME ONLY. NOT ALCOHOL. NOT TOBACCO. NOT HOT FOOD."}, {"h": ["Situation", "Action"], "rows": [["Customer wants beer or wine on Lone Star Card", "Refuse — alcohol is never SNAP-eligible"], ["Customer wants cigarettes on Lone Star Card", "Refuse — tobacco is never SNAP-eligible"], ["Customer buys roller grill item with Lone Star Card", "POS should block — if it doesn't, do not process · notify Captain"], ["POS accepts something you believe is ineligible", "Do not process · notify Captain"], ["Customer asks for cash back on SNAP portion", "Refuse — EBT does not give cash back on SNAP"], ["Customer asks you to enter their PIN", "Decline — they enter their own PIN"]]}, {"note": "The POS handles most of this automatically. Your job is to recognize when something is wrong and stop before you process it."}, {"src": "USDA FNS SNAP Rules · 7 U.S.C. §2012 · N&F Operations Policy"}]}], "ca": "#98E25A", "cd": "#2A4116", "quiz": [{"q": "SNAP benefits are delivered in Texas via the:", "opts": ["Green Card", "Lone Star Card", "EBT Gold Card", "Texas Benefits Card"], "ans": 1}, {"q": "Which item is NOT eligible for SNAP purchase?", "opts": ["Fresh vegetables", "Canned soup", "Hot prepared food", "Cheese"], "ans": 2}, {"q": "SNAP trafficking is:", "opts": ["A minor infraction handled by the store", "A federal crime with serious penalties", "Only illegal if over $500", "A state-level misdemeanor"], "ans": 1}, {"q": "When a customer uses a Lone Star Card, you should:", "opts": ["Enter their PIN for them if they ask", "Never enter the PIN — the customer must enter it themselves", "Ask for a second ID", "Record the card number"], "ans": 1}, {"q": "Regarding the 2025–26 Texas candy/soda SNAP waiver, you should:", "opts": ["Start accepting SNAP for soda immediately", "Wait until your POS is officially updated before changing behavior", "Refuse SNAP for candy and soda regardless", "Ask the customer if their state allows it"], "ans": 1}]}, {"name": "Food Handler Certificate", "sub": "30-day rule · CFPM · records · personal hygiene", "audience": "All Officers & Captains", "num": "O5", "official": true, "slides": [{"k": "Food Handler · Overview", "t": "Food Handler Certificate — Required by Texas Law", "body": ["Texas law requires all food handlers in a retail food establishment to hold a valid food handler certificate from an accredited provider.", {"h": ["At a glance", "Detail"], "rows": [["Required by", "Texas Health & Safety Code §228.033"], ["Who must certify", "Every employee who handles unpackaged food"], ["Deadline for new hires", "Within 30 days of hire"], ["Certificate valid for", "2 years"], ["Accreditation", "ANSI-CFP or Texas DSHS-approved provider"], ["Record keeping", "Employer must keep certificates on file — available for inspection"], ["N&F policy", "Certificate on file before solo food handling duty"]]}, {"src": "Tex. Health & Safety Code §228.033 · Texas DSHS Food Handler Training Requirements"}]}, {"k": "Food Handler · What It Covers", "t": "What the Course Covers", "body": ["The food handler course covers the knowledge required to handle food safely in a retail environment. It is not just a test — these are daily practices.", {"label": "Core topics in the certification"}, ["Personal hygiene — handwashing, illness policy, correct glove use", "Temperature danger zone — 41°F to 135°F and time limits in that range", "Cross-contamination — keeping raw proteins away from ready-to-eat foods", "Cleaning vs. sanitizing — when each is required and the difference", "Foodborne illness — major pathogens and how they spread to customers", "Receiving and storage — FIFO, date marking, how to reject a bad delivery"], {"note": "Approved online providers include StateFoodSafety.com and Texas DSHS-approved courses. The course takes approximately 2 hours."}, {"src": "ANSI-CFP Standard · Texas DSHS Food Handler Program · N&F Training Policy"}]}, {"k": "Food Handler · CFPM", "t": "Certified Food Protection Manager", "body": ["A CFPM is a higher certification required in Texas for certain food establishment types. At N&F, at least one CFPM should be designated per store.", {"h": ["Comparison", "Food Handler Certificate", "CFPM"], "rows": [["Required for", "Any employee handling unpackaged food", "At least one per establishment (certain types)"], ["Exam", "Yes — after online course (basic)", "Yes — proctored exam (ServSafe, NEHA, etc.)"], ["Valid for", "2 years", "5 years"], ["Approximate cost", "$10–25", "$125–180 (exam + course)"], ["Who at N&F needs it", "All food-handling Officers and Captains", "Captain or designated store manager"]]}, {"note": "The CFPM is the go-to person during a health inspection. Every Captain should know who the CFPM is at their location before their first shift."}, {"src": "Tex. Health & Safety Code §228.033 · Texas DSHS CFPM Requirements · FDA Food Code 2-102.12"}]}, {"k": "Food Handler · Records", "t": "Record Keeping Requirements", "body": ["Employers must maintain food handler certificates on file and produce them for health inspections on request.", {"h": ["Record requirement", "Detail"], "rows": [["What to keep", "Copy of each food-handling employee's current certificate"], ["Where to keep it", "On-site — accessible during health inspection · copy on Khawarsons-Drive"], ["How long", "Duration of employment + 60 days after separation"], ["Inspection request", "Must be produced immediately on request from a health inspector"], ["Failure to produce", "Health code violation · corrective action required · possible closure order"]]}, {"label": "Captain's checklist for food handler compliance"}, ["Confirm new hire completes food handler course within 30 days of start date", "Save certificate PDF to employee folder on Khawarsons-Drive under their Personal drive", "Review expiration dates monthly — 2-year certificates expire and must be renewed", "Remove employees from food handling duty if their certificate has lapsed — no exceptions"], {"src": "Tex. Health & Safety Code §228.033 · Texas DSHS Food Establishment Inspection Standards"}]}, {"k": "Food Handler · Personal Hygiene", "t": "Daily Personal Hygiene Standards", "body": ["The certification requires mastery of personal hygiene. These are daily practices — not just test answers.", {"label": "Handwashing — when and how"}, ["Wash on arrival, after restroom, after handling money, after touching your face, after raw proteins, after taking out trash", "20 seconds minimum with soap — count it out or use a timer", "Dry with a disposable paper towel — not a cloth towel or air dryer in a prep area"], {"label": "Illness policy — when to stay home"}, ["Do NOT handle unpackaged food if you have: vomiting, diarrhea, jaundice, or sore throat with fever", "Report illness to your Captain before the shift — not mid-shift after customers have been served", "Return to food handling only after 24 hours symptom-free, or with written medical clearance"], {"warn": "Reporting illness is not grounds for discipline. Concealing illness and handling food is a health code violation and a public safety issue with real consequences."}, {"src": "Texas DSHS Food Handler Curriculum · FDA Food Code §2-201.11 (Reporting Illness)"}]}, {"k": "Food Handler · Quick Reference", "t": "Food Handler Quick Reference", "body": [{"big": "30-DAY RULE: Certificate within 30 days of hire. No certificate = no food handling."}, {"h": ["Situation", "Action"], "rows": [["New hire starts", "Assign food handler course · track completion · 30-day deadline"], ["Certificate expires", "Employee off food handling duty until renewed"], ["Health inspector requests certificates", "Produce all current certificates immediately"], ["Employee arrives with vomiting or diarrhea", "Send home — no food handling today"], ["Employee has cut on hand", "Waterproof bandage + glove required before any food handling"], ["Certificate is lost or misplaced", "Employee re-takes the course — no grace period"]]}, {"src": "Tex. Health & Safety Code §228.033 · N&F Operations Policy · Texas DSHS Food Handler Program"}]}], "ca": "#5A71E2", "cd": "#161D41", "quiz": [{"q": "How many days does a new food handler have to obtain their certificate?", "opts": ["7 days", "14 days", "30 days", "60 days"], "ans": 2}, {"q": "A Food Handler Certificate is valid for:", "opts": ["1 year", "2 years", "3 years", "5 years"], "ans": 1}, {"q": "A Certified Food Protection Manager (CFPM) certificate is valid for:", "opts": ["1 year", "2 years", "3 years", "5 years"], "ans": 3}, {"q": "Where should food handler certificates be stored?", "opts": ["At the employee's home", "In the manager's personal files", "In your Personal drive on Khawarsons-Drive", "Emailed to corporate only"], "ans": 2}, {"q": "An employee shows up with vomiting symptoms. You should:", "opts": ["Let them work if they feel okay", "Have them wear a mask and continue", "Send them home — they cannot handle food", "Ask a doctor via text first"], "ans": 2}]}, {"name": "Human Trafficking Awareness", "sub": "Signs · hotline · required signage · how to report", "audience": "All Officers & Captains", "num": "O6", "official": true, "slides": [{"k": "Trafficking · Overview", "t": "Human Trafficking Awareness — Required by Law", "body": ["Texas law requires certain businesses — including convenience stores and fuel retailers — to post a human trafficking awareness notice and ensure employees can recognize and report potential trafficking situations.", {"h": ["Legal requirement", "Detail"], "rows": [["Signage law", "Texas Business & Commerce Code §20A.002"], ["Who is covered", "Convenience stores, fuel retailers, lodging, bars, adult entertainment, and others"], ["What is required", "Post the STOP sign + train employees to recognize and report"], ["Hotline", "National Human Trafficking Hotline: 1-888-373-7888 — 24/7, 200+ languages"], ["Text", "Text 'HELP' or 'INFO' to 233733"], ["Report online", "humantraffickinghotline.org"]]}, {"src": "Tex. Bus. & Com. Code §20A.002 · Texas AG Human Trafficking Prevention · oag.texas.gov/human-trafficking"}]}, {"k": "Trafficking · What It Is", "t": "What Human Trafficking Is", "body": ["Human trafficking is the use of force, fraud, or coercion to exploit a person for labor or commercial sex. It happens in every city and frequently intersects with convenience stores and fuel stations.", {"h": ["Type", "Definition", "How it touches c-stores"], "rows": [["Sex trafficking", "Commercial sexual exploitation by force, fraud, or coercion — or involving any minor", "Victims brought in by traffickers to buy personal items; not free to speak openly"], ["Labor trafficking", "Forced labor through debt, threats, or withholding documents", "Workers brought in for purchases · may appear exhausted, fearful, or malnourished"]]}, {"big": "Trafficking victims are rarely chained or visibly confined. The control is psychological, financial, and through fear."}, {"note": "Texas ranks among the top five states nationally for reported human trafficking cases. C-stores and fuel stations are common points of intersection."}, {"src": "Tex. Penal Code §20A.02 · Polaris Project Typology of Modern Slavery · Texas AG Annual Report"}]}, {"k": "Trafficking · Signs", "t": "Recognizing Potential Victims and Traffickers", "body": ["You will not always know for certain. You are looking for patterns, not proof. Trust your instincts — calling the hotline is what you are trained to do.", {"label": "Signs of a potential victim"}, ["Appears disoriented, confused, or coached on what to say", "Avoids eye contact or seems fearful — especially around the person they came in with", "Has a companion who answers for them and will not leave them alone", "Appears malnourished, exhausted, or has visible untreated injuries", "Buying large amounts of personal care items suggesting commercial activity", "Does not seem to know where they are or what city they're in", "Uses prepaid cards but seems to have no control over purchases"], {"label": "Signs of a potential trafficker"}, ["Controls the conversation completely — answers all questions for the other person", "Will not let the other person speak or step away", "Pays for everything", "Watches the other person closely and monitors their behavior"], {"note": "You are not responsible for rescuing anyone. You are responsible for calling the hotline. Let trained professionals handle the response."}, {"src": "Polaris Project · National Human Trafficking Hotline Recognition Guide · Texas AG Awareness Training"}]}, {"k": "Trafficking · How to Report", "t": "How to Report — The Hotline", "body": ["If you see something that concerns you, call or text the National Human Trafficking Hotline. The call is confidential.", {"big": "1-888-373-7888 · Text HELP to 233733\n24/7 · 200+ languages · Confidential"}, {"h": ["Tell the hotline", "What to include"], "rows": [["Location", "Your store address"], ["Description", "Person, companion, vehicle description, license plate if visible"], ["Time", "When it occurred"], ["What concerned you", "What specifically you observed — be factual and specific"]]}, {"note": "You do not need to be certain. You do not need to witness a crime. A call based on genuine concern is the right call and is protected."}, {"warn": "Do not confront a suspected trafficker. Do not tell a potential victim you are calling. These actions can endanger you and the victim."}, {"src": "National Human Trafficking Hotline · Texas AG Human Trafficking Unit · oag.texas.gov"}]}, {"k": "Trafficking · Required Signage", "t": "Required STOP Trafficking Sign", "body": ["Texas Business & Commerce Code §20A.002 requires qualifying businesses to post a human trafficking awareness notice with the hotline number.", {"h": ["Requirement", "Detail"], "rows": [["Sign content", "Must include the National Human Trafficking Hotline number (1-888-373-7888)"], ["Where to post", "Conspicuous place visible to customers — at minimum near entrance or restrooms"], ["Language", "English and Spanish both required; additional languages recommended"], ["Source", "Texas AG provides free downloadable signs at oag.texas.gov/human-trafficking"], ["Penalty for non-posting", "Misdemeanor fine for the business owner/operator"]]}, {"note": "Check the sign on your shift. If it is missing, damaged, or blocked by merchandise, tell your Captain before the shift ends."}, {"src": "Tex. Bus. & Com. Code §20A.002 · Texas AG Human Trafficking Prevention Program"}]}, {"k": "Trafficking · Quick Reference", "t": "Human Trafficking Quick Reference", "body": [{"big": "HOTLINE: 1-888-373-7888 · TEXT 233733 · 24/7 · CONFIDENTIAL"}, {"h": ["Situation", "Action"], "rows": [["Potential victim seems controlled, fearful, or coached", "Note descriptions mentally · call hotline when safe"], ["Potential victim is alone and seems to need help", "Offer water or a moment · call hotline discreetly"], ["Suspected trafficker is present", "Do not confront · call hotline after they leave, or ask Captain"], ["Emergency — someone is in immediate danger", "Call 911 first, then hotline"], ["STOP sign is missing", "Notify Captain before end of shift"], ["Customer asks about the sign", "'It's a resource for anyone who needs help' — nothing more needed"]]}, {"src": "Tex. Bus. & Com. Code §20A.002 · NHTH · Texas AG · N&F Operations Policy"}]}], "ca": "#E26B5A", "cd": "#411B16", "quiz": [{"q": "The National Human Trafficking Hotline phone number is:", "opts": ["1-800-222-1222", "1-888-373-7888", "1-800-426-4263", "1-866-347-2423"], "ans": 1}, {"q": "Which is a red flag for a potential trafficking victim?", "opts": ["Paying with cash", "Seeming disoriented with a controlling companion who answers for them", "Buying multiple items", "Wearing a uniform"], "ans": 1}, {"q": "Texas law requires qualifying businesses to post STOP signs in:", "opts": ["English only", "Spanish only", "Both English and Spanish", "The language of the nearest consulate"], "ans": 2}, {"q": "If you suspect trafficking, you should:", "opts": ["Confront the suspected trafficker directly", "Alert the potential victim privately", "Call the hotline — do not confront or alert", "Wait until your shift ends to report"], "ans": 2}, {"q": "Labor trafficking involves:", "opts": ["Only restaurant workers", "Using force, fraud, or coercion to compel labor", "Only undocumented workers", "Only international victims"], "ans": 1}]}, {"name": "TCEQ Class A & B — UST Operator", "sub": "Monthly walkthrough · records · release reporting · certification", "audience": "Captains / Managers", "num": "O7", "official": true, "slides": [{"k": "TCEQ A/B · Overview", "t": "UST Operator Training — Class A & B (Managers)", "body": ["Texas requires Underground Storage Tank (UST) operators to be trained and documented. TCEQ (Texas Commission on Environmental Quality) administers this program. Class A and B apply to managers and supervisors at fuel-selling locations.", {"h": ["At a glance", "Detail"], "rows": [["Regulatory authority", "TCEQ — Texas Commission on Environmental Quality"], ["Federal backing", "EPA 40 CFR Part 280.245 (2015 UST rule)"], ["Class A", "Responsible for overall UST compliance — typically the store owner or senior manager"], ["Class B", "Responsible for day-to-day UST operations — typically the Captain or store supervisor"], ["Training requirement", "TCEQ-approved course · initial certification + review every 3 years"], ["Assignment deadline", "Within 30 days of being assigned UST duties"]]}, {"src": "TCEQ UST Operator Training Program · 30 Tex. Admin. Code §334.602 · EPA 40 CFR §280.245"}]}, {"k": "TCEQ A/B · Class A Responsibilities", "t": "What the Class A Operator Does", "body": ["The Class A operator is responsible for the overall compliance posture of the UST facility — they know the regulations and manage the operator program from above.", {"label": "Class A responsibilities"}, ["Understands all applicable UST regulations and permit requirements", "Ensures the facility has correct TCEQ permits and registrations — and that they are current", "Designates and documents qualified Class B and Class C operators for each site", "Ensures all operator training records are complete and current", "Is the point of contact with TCEQ for compliance questions and correspondence", "Reviews and signs off on compliance documentation as required"], {"note": "At N&F, the Class A operator is the owner or a designated senior manager. Class A does not need to be physically present at the store every day."}, {"src": "TCEQ UST Operator Training Materials · 30 TAC §334.602 · EPA Class A Operator Definition"}]}, {"k": "TCEQ A/B · Class B Responsibilities", "t": "What the Class B Operator Does", "body": ["The Class B operator manages day-to-day UST compliance at the site. This is typically the store Captain or a designated supervisor.", {"label": "Class B responsibilities"}, ["Performs (or supervises) monthly walkthroughs of UST equipment and documents findings", "Maintains the site's compliance records — inspection logs, release detection records, equipment test records", "Trains Class C operators and keeps signed records of that training", "Responds to equipment alarms, spills, and anomalies at the site", "Reports releases and suspected releases to TCEQ within required timeframes", "Ensures release detection equipment remains operational"], {"h": ["Key Class B record", "Retention period"], "rows": [["Monthly walkthrough log", "3 years minimum"], ["Release detection test results", "1 year minimum"], ["Equipment test / inspection records", "Life of equipment + 3 years"], ["Class C training records", "Duration of assignment + 3 years"]]}, {"src": "30 TAC §334.602 · TCEQ UST Class B Operator Guidance · EPA 40 CFR §280.245"}]}, {"k": "TCEQ A/B · How to Get Certified", "t": "Class A/B Certification Process", "body": ["TCEQ-approved UST operator training is available online and in-person. Class A and Class B complete the same initial training — the role determines their ongoing responsibilities.", {"h": ["Step", "Action"], "rows": [["1", "Go to tceq.texas.gov → Water → Underground Storage Tanks → Operator Training"], ["2", "Complete a TCEQ-approved Class A/B operator course"], ["3", "Pass the assessment"], ["4", "Submit documentation to TCEQ (some approved providers handle this automatically)"], ["5", "Review training every 3 years — mandatory refresher"]]}, {"note": "Some TCEQ-approved courses are free online. Check tceq.texas.gov for the current approved provider list."}, {"warn": "Operating a UST facility without a trained, documented Class A/B operator on record is a compliance violation. Operators must be assigned and documented before taking on UST duties."}, {"src": "TCEQ Operator Training Provider List · tceq.texas.gov/permitting/ust/operator-training · 30 TAC §334.602"}]}, {"k": "TCEQ A/B · Monthly Walkthrough", "t": "Monthly Compliance Walkthrough", "body": ["The Class B operator must conduct a monthly walkthrough of the UST facility and document findings. This is a legal requirement.", {"label": "What to inspect during the walkthrough"}, ["Spill bucket — empty, no cracks, lid seated properly", "Overfill device — intact and functional", "Vent lines — unobstructed", "Release detection equipment — operational, no active alarms", "Dispenser sump — dry, no fuel odor", "Containment sump at fill port — dry", "Fuel delivery equipment — no visible leaks or drips", "Soil and pavement around equipment — no staining, no fuel sheen on water"], {"h": ["If you find a problem", "Required action"], "rows": [["Equipment failure", "Report to Class A · schedule repair · document date of discovery"], ["Spill or confirmed release", "Notify Class A immediately · follow release reporting protocol"], ["Suspected release — fuel odor, staining, unexplained inventory loss", "Notify Class A immediately — TCEQ reporting may be required within 24 hours"]]}, {"src": "30 TAC §334.602 · TCEQ UST Monthly Walkthrough Checklist · EPA Walkthrough Guidance"}]}, {"k": "TCEQ A/B · Release Reporting", "t": "Reporting a Suspected Fuel Release", "body": ["Any suspected or confirmed fuel release must be reported to TCEQ. The reporting clock starts the moment you become aware of it.", {"h": ["Situation", "Reporting deadline", "Who reports"], "rows": [["Spill over 25 gallons", "24 hours", "Class A or B"], ["Spill that reaches surface water or causes a visible sheen", "Immediately", "Class A or B — call 911 also"], ["Suspected underground release — alarm, inventory loss, odor", "24 hours of confirmed indication", "Class A or B"], ["Release detection alarm not explained by operational cause", "24 hours", "Class A or B"], ["Emergency — fire or explosion risk", "Call 911 first — then TCEQ", "Anyone on site"]]}, {"warn": "Failing to report a suspected release on time is a separate TCEQ violation on top of the release itself. The cover-up is always worse than the incident."}, {"note": "TCEQ 24-hour release reporting: 512-239-1000 (daytime) · 512-239-6400 (nights/weekends/holidays) · Written report required within 7 days"}, {"src": "30 TAC §334.72 · TCEQ Release Reporting Requirements · EPA 40 CFR §280.50"}]}, {"k": "TCEQ A/B · Quick Reference", "t": "Class A/B Quick Reference", "body": [{"big": "MONTHLY WALKTHROUGH. RECORDS ON FILE. REPORT RELEASES WITHIN 24 HOURS."}, {"h": ["Situation", "Action"], "rows": [["New Class B assignment", "Complete TCEQ-approved training within 30 days"], ["Monthly walkthrough due", "Complete · document · sign · keep log 3 years minimum"], ["Equipment alarm", "Investigate · log time of alarm · report to Class A · schedule repair"], ["Fuel spill over 25 gal or reaches water", "Call Class A · report to TCEQ within 24 hours"], ["Release detection fails", "Do not accept fuel deliveries · notify Class A · call TCEQ"], ["TCEQ inspector arrives", "Produce all records immediately"]]}, {"src": "30 TAC §334 · TCEQ UST Program · tceq.texas.gov/permitting/ust · EPA 40 CFR §280"}]}], "motif": "fuel", "ca": "#5AE293", "cd": "#164128", "quiz": [{"q": "How long must monthly walkthrough records be retained?", "opts": ["1 year", "2 years", "3 years", "5 years"], "ans": 2}, {"q": "A spill of more than 25 gallons must be reported to TCEQ within:", "opts": ["1 hour", "8 hours", "24 hours", "72 hours"], "ans": 2}, {"q": "The TCEQ daytime reporting number is:", "opts": ["512-239-6400", "512-239-1000", "800-832-8224", "512-463-4100"], "ans": 1}, {"q": "TCEQ UST operator certifications must be renewed every:", "opts": ["1 year", "2 years", "3 years", "5 years"], "ans": 2}, {"q": "The Class A operator is primarily responsible for:", "opts": ["Daily equipment checks", "Emergency spill response", "Overall regulatory compliance and TCEQ contact", "Training Class C operators"], "ans": 2}]}, {"name": "TCEQ Class C — UST Operator", "sub": "E-stop · emergency response · site training · daily role", "audience": "Officers", "num": "O8", "official": true, "slides": [{"k": "TCEQ C · Overview", "t": "UST Class C Operator — All Officers", "body": ["A Class C UST operator is any person who performs daily operations at a UST facility — including activating fuel dispensers — under the supervision of a Class B operator. At N&F, this means every Officer who works a register near the pump area.", {"h": ["At a glance", "Detail"], "rows": [["Who is Class C", "Officers and cashiers who activate dispensers or work near the UST area"], ["Training requirement", "Trained by the Class B operator (Captain) before taking UST-related duties"], ["State certification exam", "Not required — Class C is site-trained by Class B, not independently TCEQ-certified"], ["Training record", "Class B must keep a signed record of every Class C they train"], ["Review cycle", "Annual review with Class B, or upon any significant operational change"], ["Scope", "Emergency response · basic monitoring · what to do when something goes wrong"]]}, {"src": "30 TAC §334.602(d) · TCEQ Class C Operator Training Guidance · EPA 40 CFR §280.245(c)"}]}, {"k": "TCEQ C · Daily Role", "t": "What Class C Does — and Does Not Do", "body": ["Class C operators are not compliance managers — they are the eyes and ears at the facility on a daily basis.", {"label": "What Class C does"}, ["Activates or monitors fuel dispensers from the register", "Responds to dispenser alarms and small spills as trained in their site-specific training", "Keeps an eye on the fueling area during their shift and reports anything unusual", "Reports problems immediately to the on-duty Captain (Class B) — never handles them alone", "Never operates equipment outside the scope of their Class C training"], {"label": "What Class C does NOT do"}, ["Does not perform equipment inspections or maintenance", "Does not submit reports to TCEQ — that is Class B's job", "Does not accept or authorize fuel deliveries without Class B direction", "Does not reset release detection alarms — ever"], {"note": "Your responsibility is simple: if something looks wrong, tell your Captain immediately. Your trained eyes prevent small problems from becoming expensive ones."}, {"src": "TCEQ Class C Operator Training Template · 30 TAC §334.602 · EPA Class C Operator Definition"}]}, {"k": "TCEQ C · Emergency Response", "t": "Emergency Response — What You Do", "body": ["If a fuel release, fire, or equipment emergency occurs at the pump, you are likely the first person on the scene. Know what to do before it happens.", {"h": ["Emergency", "Immediate action"], "rows": [["Fuel spill at dispenser — small, under 1 gallon", "Activate E-stop · set out cones · notify Captain"], ["Fuel spill at dispenser — large, spreading", "Activate E-stop · clear the area · call 911 · call Captain"], ["Fuel odor inside the building", "Evacuate the store immediately · call 911 · call Captain · do not flip any light switches"], ["Dispenser fire", "Activate E-stop · call 911 · evacuate · do not use water on a fuel fire"], ["Dispenser alarm — beeping or flashing", "Do not reset it · notify Captain immediately · log the exact time"], ["Power outage at dispensers", "Notify Captain — do not restore power without Class B authorization"]]}, {"big": "E-STOP is the large red emergency shutoff button. Know exactly where it is before your first shift on the register."}, {"warn": "Resetting a dispenser alarm without Class B (Captain) authorization is a Class C training violation. Log it — do not reset it."}, {"src": "TCEQ Class C Emergency Response Training · N&F Site-Specific Emergency Plan · 30 TAC §334"}]}, {"k": "TCEQ C · Site-Specific Training", "t": "Know Your Site Before You Activate a Dispenser", "body": ["Part of Class C training is site-specific. You must know the layout and equipment at your particular location before you activate a single dispenser.", {"label": "Before your first dispenser shift, you must know"}, ["The exact location of the emergency shutoff (E-stop) button — walk to it, don't just guess", "The location of the fire extinguisher rated for fuel fires (Class B extinguisher — not Class A water)", "How to activate and deactivate dispensers from the register — your Captain shows you this", "The backup contact if the Captain is unreachable during an emergency", "Where the spill kit is stored and how to use it", "The store's emergency contact list — fire department, TCEQ, Class A operator"], {"note": "Your Captain is required to walk you through all of this as part of your Class C training documentation. If this walkthrough has not happened, ask for it before you activate any dispensers."}, {"warn": "Activating dispensers without completing the Class C site walkthrough puts you, customers, and the store in legal and physical jeopardy."}, {"src": "N&F Site-Specific Training Protocol · 30 TAC §334.602 · TCEQ Class C Training Checklist"}]}, {"k": "TCEQ C · Quick Reference", "t": "Class C Quick Reference", "body": [{"big": "EYES ON THE PUMPS. ANYTHING WRONG — TELL YOUR CAPTAIN IMMEDIATELY. DO NOT HANDLE IT ALONE."}, {"h": ["Situation", "Action"], "rows": [["New assignment near pump register", "Ask Captain for Class C site walkthrough before activating dispensers"], ["Dispenser alarm — any alarm", "Do not reset · log time · notify Captain immediately"], ["Small fuel spill at pump", "Activate E-stop · set out cones · notify Captain"], ["Large spill or fuel fire at pump", "E-stop · evacuate · call 911 · call Captain"], ["Fuel odor inside store", "Evacuate · call 911 · do not touch light switches"], ["You don't know where the E-stop is", "Stop right now and ask your Captain — before anything else"]]}, {"warn": "Never reset an alarm, restore power after an outage, or attempt to manage a release without Class B (Captain) authorization."}, {"src": "30 TAC §334.602 · TCEQ Class C Training · N&F Operations Policy · Site Emergency Plan"}]}], "motif": "fuel", "ca": "#BA5AE2", "cd": "#341641", "quiz": [{"q": "Class C operators must be trained by:", "opts": ["TCEQ directly", "The Class A operator", "The Class B operator", "An EPA-certified trainer"], "ans": 2}, {"q": "If a Class C operator hears a dispenser alarm, they should:", "opts": ["Reset it if it seems minor", "Ignore it until the end of shift", "Log it and notify the on-duty Captain immediately", "Call TCEQ first"], "ans": 2}, {"q": "Class C operators need to know:", "opts": ["How to repair UST equipment", "Where the E-stop button is located", "How to review TCEQ records", "How to certify other Class C operators"], "ans": 1}, {"q": "In a fuel spill emergency, your first action is:", "opts": ["Call TCEQ", "Hit the E-stop, call 911 if fire/injury, notify Captain", "Try to contain the spill yourself", "Wait for the Class A operator"], "ans": 1}, {"q": "Class C operators do NOT:", "opts": ["Monitor dispensers during their shift", "Watch the fueling area", "Operate equipment they haven't been trained on", "Report issues to the Captain"], "ans": 2}]}]}, "binder": {"title": "The Bull Binder", "icon": "📕", "motif": "binder", "tier": "binder", "desc": "Operating procedures — roles, systems, service, food, merchandising, and store reference.", "topics": [{"name": "Manager Contact List", "sub": "Store manager directory", "audience": "Captains", "num": "B01", "official": false, "slides": [{"k": "Queued · Manager Contact List", "t": "Manager Contact List", "body": ["This topic is part of the Bull Binder Operations section and will be authored in the next build phase.", {"note": "Holds per const main = document.getElementById('main');
const sidenav = document.getElementById('sidenav');
const srch = document.getElementById('srch');
let dSec='', dTopic=0, dSlide=0;

// NAV
function buildNav(){
  sidenav.innerHTML='';
  Object.entries(C).forEach(([k,s])=>{
    const sec=document.createElement('div');
    sec.className='nav-sec-hdr';
    sec.innerHTML=`<span class="nav-sec-icon">${s.icon}</span><span class="nav-sec-lbl">${s.title}</span>`;
    sec.onclick=()=>{srch.value='';showSection(k);};
    sidenav.appendChild(sec);
    s.topics.forEach((t,ti)=>{
      const el=document.createElement('div');
      el.className='ni'; el.dataset.k=k; el.dataset.ti=ti;
      el.innerHTML=`<span class="ni-dot" style="background:${t.ca||'#F4B216'}"></span><span class="ni-num">${t.num}</span><span class="ni-lbl">${t.name}</span>`;
      el.onclick=()=>{srch.value='';openTopic(k,ti,0);};
      sidenav.appendChild(el);
    });
  });
}
function setNav(sk,ti){
  document.querySelectorAll('.ni').forEach(n=>{
    n.classList.toggle('active', n.dataset.k===sk && parseInt(n.dataset.ti)===(ti||0) && sk!=='');
  });
}

// HOME
function goHome(){
  setNav('');
  let h=`<div class="home"><h1>Now &amp; Forever</h1><p class="lead">Manager &amp; Officer Reference · Khawarsons Convenience</p>`;
  Object.entries(C).forEach(([k,s])=>{
    h+=`<div class="zone">
      <div class="zone-hd">
        <span class="zh-title">${s.icon} ${s.title}</span>
        <span class="zh-badge ${s.tier||'binder'}">${s.tier==='official'?'Required by Law':'Operations'}</span>
        <div class="zh-line"></div>
      </div>
      <p class="zh-desc">${s.desc}</p>
      <div class="topic-list">${s.topics.map((t,i)=>trow(k,t,i)).join('')}</div>
    </div>`;
  });
  h+='</div>';
  main.innerHTML=h;
  bindRows();
}

function showSection(k){
  setNav(k);
  const s=C[k];
  main.innerHTML=`<div class="home">
    <h1>${s.icon} ${s.title}</h1>
    <p class="lead">${s.desc}</p>
    <div class="zone"><div class="topic-list">${s.topics.map((t,i)=>trow(k,t,i)).join('')}</div></div>
  </div>`;
  bindRows();
}

function trow(sk,t,i){
  const ca=t.ca||'#F4B216', cd=t.cd||'#5A3A06';
  return `<div class="trow ${t.official?'official':''}" data-sk="${sk}" data-i="${i}" style="border-left:3px solid ${ca};--accent:${ca};--accent-deep:${cd}">
    <span class="trow-num" style="color:${ca}">${t.num}</span>
    <div class="trow-body">
      <div class="trow-name">${t.name}</div>
      <div class="trow-sub">${t.sub}</div>
    </div>
    <span class="trow-aud">${t.audience}</span>
    <span class="chev" style="color:${ca}">›</span>
  </div>`;
}

function bindRows(){
  document.querySelectorAll('.trow').forEach(r=>{
    r.onclick=()=>openTopic(r.dataset.sk,parseInt(r.dataset.i),0);
  });
}

// DECK
function openTopic(sk,ti,si){dSec=sk;dTopic=ti;dSlide=si;renderDeck();}
function renderQuiz(qs,accent,accentDeep){
  const qHtml=qs.map((q,qi)=>`
    <div class="quiz-q" id="qq${qi}">
      <div class="quiz-q-text"><span class="quiz-q-num">${qi+1}</span>${q.q}</div>
      <div class="quiz-opts">
        ${q.opts.map((o,oi)=>`<div class="quiz-opt" data-qi="${qi}" data-oi="${oi}">${o}</div>`).join('')}
      </div>
    </div>`).join('');
  return `<div class="quiz-wrap">
    <div class="quiz-title">📝 Knowledge Check</div>
    ${qHtml}
    <button class="quiz-submit" id="qSubmit" disabled>Submit Answers</button>
    <div class="quiz-result" id="qResult" style="display:none"></div>
  </div>`;
}
function bindQuiz(qs){
  const sel={};
  document.querySelectorAll('.quiz-opt').forEach(el=>{
    el.onclick=()=>{
      const qi=parseInt(el.dataset.qi);
      document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`).forEach(x=>x.classList.remove('selected'));
      el.classList.add('selected');
      sel[qi]=parseInt(el.dataset.oi);
      document.getElementById('qSubmit').disabled=Object.keys(sel).length<qs.length;
    };
  });
  document.getElementById('qSubmit').onclick=()=>{
    let score=0;
    qs.forEach((q,qi)=>{
      document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`).forEach(el=>{
        const oi=parseInt(el.dataset.oi);
        if(oi===q.ans){el.classList.add('correct');}
        else if(el.classList.contains('selected')&&oi!==q.ans){el.classList.add('wrong');}
        el.style.pointerEvents='none';
      });
      if(sel[qi]===q.ans) score++;
    });
    document.getElementById('qSubmit').style.display='none';
    const pct=Math.round(score/qs.length*100);
    const msg=pct===100?'Perfect — you know this topic cold. 🔥':pct>=80?'Strong. Review any misses before your next shift.':pct>=60?'Decent. Spend some time on the slides you missed.':'Review this topic carefully before serving customers.';
    document.getElementById('qResult').style.display='block';
    document.getElementById('qResult').innerHTML=`<div class="quiz-score-lbl">${score} / ${qs.length} &nbsp;(${pct}%)</div><p style="color:var(--ink-soft);font-size:14px">${msg}</p><button class="quiz-retake" id="qRetake">Retake Quiz</button>`;
    document.getElementById('qRetake').onclick=()=>{openTopic(dSec,dTopic,dSlide);};
  };
}

function renderDeck(){
  const sec=C[dSec], t=sec.topics[dTopic];
  const hasQuiz=t.quiz&&t.quiz.length>0;
  const realSlides=t.slides, total=realSlides.length+(hasQuiz?1:0);
  const isQuiz=hasQuiz&&dSlide===total-1;
  const slides=realSlides, slide=isQuiz?null:slides[dSlide];
  const mot=M[t.motif]||M[sec.motif]||M['law'];
  const accent=t.ca||'#F4B216', accentDeep=t.cd||'#5A3A06';
  setNav(dSec,dTopic);
  let body='';
  if(isQuiz){
    body=renderQuiz(t.quiz,accent,accentDeep);
  } else {
    body=`<h2 class="s-title">${slide.t}</h2>`;
    (slide.body||[]).forEach(item=>{
      if(typeof item==='string'){body+=`<p class="s-p">${item}</p>`;}
      else if(Array.isArray(item)){body+='<ul class="s-ul">'+item.map(b=>`<li>${b}</li>`).join('')+'</ul>';}
      else if(item.h&&item.rows){
        body+='<table class="s-tbl"><thead><tr>'+item.h.map(h=>`<th>${h}</th>`).join('')+'</tr></thead><tbody>'+
          item.rows.map(row=>'<tr>'+row.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
      }else if(item.label){body+=`<div class="s-lbl">${item.label}</div>`;}
      else if(item.big){body+=`<div class="s-big">${item.big}</div>`;}
      else if(item.note){body+=`<div class="s-note">ℹ️ ${item.note}</div>`;}
      else if(item.warn){body+=`<div class="s-warn">⚠️ ${item.warn}</div>`;}
      else if(item.quote){body+=`<div class="s-quote">${item.quote}</div>`;}
      else if(item.src){body+=`<div class="s-src">📎 ${item.src}</div>`;}
    });
  }
  main.innerHTML=`<div class="deck" style="--accent:${accent};--accent-deep:${accentDeep}">
    <div class="deck-hdr">
      <button class="back-btn" id="backBtn">← Back</button>
      <span class="deck-crumb">${t.num} · ${isQuiz?'Knowledge Check':slide.k||t.name}</span>
    </div>
    <div class="deck-body">
      <div class="slide-pane">${body}</div>
      <div class="rail">
        <div class="rail-img" style="${mot.img?'background:url('+mot.img+') center/cover no-repeat':''}">
          ${mot.img?'':'<span class="rail-symbol">'+mot.symbol+'</span>'}
          <span class="rail-section-lbl" style="${mot.img?'opacity:.8;background:rgba(0,0,0,.35);width:100%;text-align:center;padding:4px 0;position:absolute;bottom:0':''}"> ${sec.title}</span>
        </div>
        <div class="rail-meta">
          <div>
            <span class="rail-aud ${t.official?'gold':''}">${t.audience}</span>
            <div class="rail-topic">${t.name}</div>
          </div>
          <div class="rail-prog">Slide <strong>${dSlide+1}</strong> of <strong>${total}</strong></div>
        </div>
      </div>
    </div>
    <div class="deck-nav">
      <button class="nav-btn prev" id="prevBtn" ${dSlide===0?'disabled':''}>← Prev</button>
      <span class="nav-ctr">${isQuiz?"📝 Quiz":`<strong>${dSlide+1}</strong> / ${total}`}</span>
      <button class="nav-btn nxt" id="nxtBtn" ${dSlide===total-1?'disabled':''}>Next →</button>
    </div>
  </div>`;
  document.getElementById('backBtn').onclick=()=>showSection(dSec);
  document.getElementById('prevBtn').onclick=()=>{dSlide--;renderDeck();};
  document.getElementById('nxtBtn').onclick=()=>{dSlide++;renderDeck();};
  if(isQuiz&&t.quiz) bindQuiz(t.quiz);
}

// SEARCH
srch.addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  if(!q){goHome();return;}
  const results=[];
  Object.entries(C).forEach(([sk,sec])=>{
    sec.topics.forEach((t,ti)=>{
      t.slides.forEach((slide,si)=>{
        const txt=[slide.t,slide.k,...(slide.body||[]).map(b=>
          typeof b==='string'?b:Array.isArray(b)?b.join(' '):JSON.stringify(b)
        )].join(' ').toLowerCase();
        if(txt.includes(q)) results.push({sk,ti,si,tName:t.name,sTitle:slide.t,num:t.num,secTitle:sec.title});
      });
    });
  });
  setNav('');
  if(!results.length){
    main.innerHTML=`<div class="home"><p class="sr-none">No results for "<strong>${q}</strong>"</p></div>`;
    return;
  }
  const items=results.map(r=>
    `<div class="sr-item" data-sk="${r.sk}" data-ti="${r.ti}" data-si="${r.si}">
      <div class="sr-name">${r.num} · ${r.tName} — ${r.sTitle}</div>
      <div class="sr-meta">${r.secTitle}</div>
    </div>`).join('');
  main.innerHTML=`<div class="home"><h1>Search</h1><p class="lead">${results.length} result${results.length!==1?'s':''} for "<strong>${q}</strong>"</p></div><div class="sr-list">${items}</div>`;
  document.querySelectorAll('.sr-item').forEach(el=>{
    el.onclick=()=>openTopic(el.dataset.sk,parseInt(el.dataset.ti),parseInt(el.dataset.si));
  });
});

buildNav(); goHome();
</script>
</body>
